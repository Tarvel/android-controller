<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ACC — Android Claude Controller{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; }
        nav { background: #161b22; border-bottom: 1px solid #30363d; padding: 12px 24px; display: flex; gap: 20px; align-items: center; }
        nav a { color: #58a6ff; text-decoration: none; }
        nav a:hover { text-decoration: underline; }
        nav .brand { font-weight: bold; font-size: 1.1em; color: #f0f6fc; }
        .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
        h1 { color: #f0f6fc; margin-bottom: 16px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
        .card h2 { margin-bottom: 12px; color: #f0f6fc; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #21262d; }
        th { color: #8b949e; font-weight: 600; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.8em; }
        .badge-active { background: #238636; color: #fff; }
        .badge-completed { background: #1f6feb; color: #fff; }
        .badge-error { background: #da3633; color: #fff; }
        .btn { display: inline-block; padding: 8px 16px; border-radius: 6px; text-decoration: none; cursor: pointer; border: 1px solid #30363d; background: #21262d; color: #c9d1d9; }
        .btn:hover { background: #30363d; }
        .btn-primary { background: #238636; border-color: #2ea043; color: #fff; }
        .btn-primary:hover { background: #2ea043; }
        .btn-danger { background: #da3633; border-color: #f85149; color: #fff; }
        .btn-danger:hover { background: #f85149; }
        .chat-container { display: flex; flex-direction: column; gap: 12px; max-height: 60vh; overflow-y: auto; margin-bottom: 16px; }
        .chat-msg { padding: 10px 14px; border-radius: 8px; max-width: 85%; }
        .chat-user { background: #1f6feb; align-self: flex-end; }
        .chat-assistant { background: #161b22; border: 1px solid #30363d; align-self: flex-start; }
        .chat-tool { background: #0d1117; border: 1px solid #30363d; align-self: flex-start; font-family: monospace; font-size: 0.9em; }
        .chat-system { background: #21262d; align-self: center; font-style: italic; }
        .input-group { display: flex; gap: 8px; }
        .input-group input { flex: 1; padding: 10px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; }
        .input-group button { padding: 10px 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
        .muted { color: #8b949e; font-size: 0.9em; }
    </style>
</head>
<body>
<nav>
    <span class="brand">🤖 ACC</span>
    <a href="{% url 'dashboard' %}">Dashboard</a>
    <a href="{% url 'device_list' %}">Devices</a>
    <a href="{% url 'session_list' %}">Sessions</a>
    <a href="{% url 'session_create' %}">New Session</a>
</nav>
<div class="container">
{% block content %}{% endblock %}
</div>
{% block scripts %}{% endblock %}
</body>
</html>
